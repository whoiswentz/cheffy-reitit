version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cheffy
      POSTGRES_PASSWORD: cheffy_password
      POSTGRES_DB: cheffy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./resources/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  postgres_data:
